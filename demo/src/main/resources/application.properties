spring.application.name=payment-system-backend

# Default to the mysql profile so the app uses TiDB Cloud without env vars.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:mysql}

server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

twilio.account-sid=${TWILIO_ACCOUNT_SID:your_twilio_sid}
twilio.auth-token=${TWILIO_AUTH_TOKEN:your_twilio_token}
twilio.phone-number=${TWILIO_PHONE_NUMBER:your_twilio_number}

jwt.secret=${JWT_SECRET:mysecretkeymysecretkeymysecretkey123}
jwt.refresh-secret=${JWT_REFRESH_SECRET:refreshsecretrefreshsecretrefresh1}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:your_email@gmail.com}
spring.mail.password=${MAIL_PASS:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.autoconfigure.exclude=

razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_Sm2CN6J4M8ukbQ}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:hyNLWNyvpAWs8qeyR2IAyPB4}
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:razorpay_webhook_secret_test_2026}

spring.security.user.password=disabled

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
