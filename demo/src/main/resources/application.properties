spring.application.name=payment-system-backend

# ─── Profile selection ────────────────────────────────────────────────────────
spring.profiles.active=${SPRING_PROFILES_ACTIVE:mysql}

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── MySQL datasource ─────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Connection pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ─── Twilio SMS ───────────────────────────────────────────────────────────────
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.refresh-secret=${JWT_REFRESH_SECRET}

# ─── Email (SMTP) ─────────────────────────────────────────────────────────────
# Set MAIL_HOST, MAIL_USER, MAIL_PASS in your environment for email notifications.
# Leave empty to disable email (in-app + WebSocket notifications still work).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Don't fail on startup if mail not configured
spring.autoconfigure.exclude=

# Razorpay payment gateway
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}

# ─── Security ─────────────────────────────────────────────────────────────────
# Disable auto-generated security password (we use JWT)
spring.security.user.password=disabled

# ─── Swagger / OpenAPI ────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
