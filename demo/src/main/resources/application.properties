spring.application.name=payment-system-backend

# ─── Profile selection ────────────────────────────────────────────────────────
# Defaults to 'mysql' (local MySQL database).
# Set SPRING_PROFILES_ACTIVE=prod in production (Railway/Render).
# Use SPRING_PROFILES_ACTIVE=local to run with H2 embedded database.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:mysql}

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── MySQL datasource (local & production) ───────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/paymentdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Anshu@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Connection pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ─── Twilio SMS (set env vars in production) ──────────────────────────────────
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:mysecretkeymysecretkeymysecretkey123}