# ─── LOCAL development profile ────────────────────────────────────────────────
# Uses H2 file-based database — NO MySQL / Railway required.
# Data persists in ./data/paymentdb between restarts.
# Run with: .\mvnw.cmd spring-boot:run -Dspring-boot.run.profiles=local
# ─────────────────────────────────────────────────────────────────────────────

server.port=8080

# H2 file-based datasource — data persists in ./data/paymentdb
spring.datasource.url=jdbc:h2:file:./data/paymentdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 web console (open http://localhost:8080/h2-console to browse the DB)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Disable MySQL-only Hikari settings that can cause issues with H2
spring.datasource.hikari.maximum-pool-size=5

# Twilio — left blank so app starts without SMS errors
twilio.account-sid=
twilio.auth-token=
twilio.phone-number=

# JWT
jwt.secret=mysecretkeymysecretkeymysecretkey123
