server.port=8080

# Keep local development self-contained with a file-backed H2 database.
spring.datasource.url=jdbc:h2:file:./data/paymentdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

twilio.account-sid=
twilio.auth-token=
twilio.phone-number=

jwt.secret=mysecretkeymysecretkeymysecretkey123
jwt.refresh-secret=refreshsecretrefreshsecretrefresh1


