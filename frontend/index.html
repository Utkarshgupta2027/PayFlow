<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PayFlow — Smart Payments</title>
    <meta name="description" content="PayFlow — Send, receive, and manage money effortlessly." />

    <!-- ── PWA Manifest ─────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── PWA Theme Color (browser chrome / address bar color) ─────────── -->
    <meta name="theme-color" content="#0B1F3A" />

    <!-- ── PWA Icons ─────────────────────────────────────────────────────── -->
    <!-- Standard favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <!-- iOS home screen icon (Safari does not use manifest icons) -->
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- ── iOS PWA: Full-screen / Standalone support ─────────────────────── -->
    <!-- Hides Safari browser UI when launched from home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PayFlow" />

    <!-- ── Android / Chrome PWA ──────────────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="PayFlow" />

    <!-- ── Microsoft Tiles (Edge / Windows) ─────────────────────────────── -->
    <meta name="msapplication-TileColor" content="#0B1F3A" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- ── Open Graph (for link sharing) ─────────────────────────────────── -->
    <meta property="og:title" content="PayFlow — Smart Payments" />
    <meta property="og:description" content="Secure Digital Payment Platform. Send, receive, and manage money effortlessly." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />

    <!-- ── Google Fonts ─────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- ── Polyfill: Some older bundlers need global ─────────────────────── -->
    <script>
      if (typeof global === 'undefined') {
        var global = window;
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
