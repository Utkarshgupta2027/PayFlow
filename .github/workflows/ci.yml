name: PayFlow CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: Test ─────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (JUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven

      - name: Run unit tests
        run: mvn test -Dspring.profiles.active=local
        env:
          SPRING_PROFILES_ACTIVE: local

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: demo/target/surefire-reports/

  # ─── Frontend: Build ───────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:8080' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ─── Status Check ──────────────────────────────────────────────────────────
  ci-status:
    name: CI Status
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.backend-test.result }}" == "success" ] && \
             [ "${{ needs.frontend-build.result }}" == "success" ]; then
            echo "✅ All CI checks passed!"
          else
            echo "❌ CI failed — backend: ${{ needs.backend-test.result }}, frontend: ${{ needs.frontend-build.result }}"
            exit 1
          fi
